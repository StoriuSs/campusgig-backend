# ============================================================================
# Docker Compose — Production (Single VPS Deployment)
# ============================================================================
# Usage:
#   docker compose -f docker-compose.prod.yaml up -d --build
#
# This is a standalone file containing all services hardened for production.
# ============================================================================

services:
  # ── NestJS Application ──
  app:
    container_name: campusgig-app-prod
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    env_file:
      - .env.production   # complete prod config — copy from .env.example on VPS
    environment:
      NODE_ENV: production  # safety net in case .env.production is missing
    ports:
      - "127.0.0.1:${PORT:-3000}:3000"  # Only reachable via Nginx on the host
    volumes:
      - app-uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      # 180s start_period gives the app time to wait for Keycloak's cold boot
      # (60-90s) and the KeycloakAdminProvider retry loop. During this window,
      # probe failures don't count against the retry budget.
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── PostgreSQL Database ──
  db:
    container_name: campusgig-db-prod
    image: postgres:16.2-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /data/postgres
    volumes:
      - db:/data/postgres
      - ./initdb:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:${DB_PORT}:5432"  # Bind to localhost only — not exposed to internet
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
    command:
      - "postgres"
      - "-c" 
      - "max_connections=100"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "log_min_duration_statement=1000"  # Log slow queries (>1s)
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Redis Cache ──
  redis:
    container_name: campusgig-redis-prod
    image: redis:7.2.4-alpine
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD}"
      - "--appendonly"
      - "yes"              # Enable AOF persistence
      - "--maxmemory"
      - "256mb"
      - "--maxmemory-policy"
      - "allkeys-lru"      # Evict least-recently-used keys when memory is full
    volumes:
      - redis-data:/data   # Persist AOF + RDB snapshots
    ports:
      - "127.0.0.1:${REDIS_PORT}:6379"  # Bind to localhost only to block public internet access. Allows secure DB administration via SSH Tunneling (e.g., DBeaver)
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 300M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ── Keycloak (Production Mode) ──
  keycloak:
    container_name: campusgig-keycloak-prod
    image: quay.io/keycloak/keycloak:26.5
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${DB_USERNAME}
      KC_DB_PASSWORD: ${DB_PASSWORD}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME}
      KC_HOSTNAME_STRICT: "true"
      KC_HTTP_PORT: 8080
      KC_PROXY_HEADERS: xforwarded     # Trust reverse proxy headers (nginx/traefik)
    # `start` without --optimized: Keycloak does its build step on first launch,
    # then starts. ~30s slower first boot than --optimized, but works directly
    # with the upstream image. --optimized requires a pre-built Keycloak image
    # (custom Dockerfile with `kc.sh build`) and we don't have one.
    command: start
    volumes:
      - ./keycloak-plugins:/opt/keycloak/providers
    ports:
      # Host-side port goes to Nginx (KEYCLOAK_HOST_PORT, e.g. 8090).
      # Container-internal port is always 8080 (matches KC_HTTP_PORT below).
      # See .env.production for why these are separate variables.
      - "127.0.0.1:${KEYCLOAK_HOST_PORT}:8080"  # Only reachable via Nginx on the host
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    # No healthcheck — Keycloak takes 60-90s to boot and we don't have a
    # reliable way to probe it from inside this image (no curl/wget,
    # /health/* endpoints need --health-enabled=true baked into the build).
    # The app's KeycloakAdminProvider has retry-with-backoff on its own.
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.0"
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Prometheus — Metrics Collection ──
  prometheus:
    container_name: campusgig-prometheus-prod
    image: prom/prometheus:v2.50.1
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"  # Internal port isolation. Hidden from public internet. Services communicate via internal Docker Network.
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=1GB'
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ── Grafana — Metrics Visualization ──
  grafana:
    container_name: campusgig-grafana-prod
    image: grafana/grafana:11.0.0
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3001}:3000"  # Only reachable via Nginx on the host (or SSH tunnel)
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/grafana/
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ── Loki — Log Aggregation ──
  loki:
    container_name: campusgig-loki-prod
    image: grafana/loki:2.9.0
    ports:
      - "127.0.0.1:${LOKI_PORT:-3100}:3100"  # Localhost only
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ── Promtail — Log Shipping to Loki ──
  promtail:
    container_name: campusgig-promtail-prod
    image: grafana/promtail:2.9.0
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ── Node Exporter — Hardware and OS metrics ──
  node-exporter:
    container_name: campusgig-node-exporter-prod
    image: prom/node-exporter:v1.8.2
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.2"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

networks:
  backend:
    driver: bridge

volumes:
  db:
  redis-data:
  app-uploads:
  prometheus-data:
  grafana-data:
  loki-data:
