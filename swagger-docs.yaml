  # -------------------------
  # HEALTH CHECK
  # -------------------------
  /health:
    get:
      summary: Check application health status
      description: Comprehensive health check including database, memory, and disk storage
      tags: [ Health ]
      responses:
        "200":
          description: Application is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
                  info:
                    type: object
                    properties:
                      database:
                        type: object
                        properties:
                          status:
                            type: string
                            example: "up"
                      memory_heap:
                        type: object
                        properties:
                          status:
                            type: string
                            example: "up"
                      memory_rss:
                        type: object
                        properties:
                          status:
                            type: string
                            example: "up"
                      storage:
                        type: object
                        properties:
                          status:
                            type: string
                            example: "up"
                  error:
                    type: object
                  details:
                    type: object
              examples:
                healthy:
                  value:
                    status: "ok"
                    info:
                      database:
                        status: "up"
                      memory_heap:
                        status: "up"
                      memory_rss:
                        status: "up"
                      storage:
                        status: "up"
                    error: {}
                    details:
                      database:
                        status: "up"
                      memory_heap:
                        status: "up"
                      memory_rss:
                        status: "up"
                      storage:
                        status: "up"
        "503":
          description: Application is unhealthy
          content:
            application/json:
              schema:
                type: object
              examples:
                unhealthy:
                  value:
                    status: "error"
                    error:
                      database:
                        status: "down"
                        message: "Connection timeout"

  /health/ready:
    get:
      summary: Check if application is ready
      description: Readiness probe for container orchestration
      tags: [ Health ]
      responses:
        "200":
          description: Application is ready
          content:
            application/json:
              schema:
                type: object
              examples:
                ready:
                  value:
                    code: "200500"
                    type: "HEALTH_CHECK"
                    message: "Health check successful"
                    data:
                      status: "ok"
                      timestamp: "2025-11-15T10:30:00.000Z"
                      uptime: 86400

  /health/live:
    get:
      summary: Check if application is alive
      description: Liveness probe for container orchestration
      tags: [ Health ]
      responses:
        "200":
          description: Application is alive
          content:
            application/json:
              schema:
                type: object
              examples:
                alive:
                  value:
                    code: "200500"
                    type: "HEALTH_CHECK"
                    message: "Health check successful"
                    data:
                      status: "ok"
                      timestamp: "2025-11-15T10:30:00.000Z"

components:
  schemas:
    # -------------------------
    # META
    # -------------------------
    Meta:
      type: object
      properties:
        code:
          type: string
          example: '200000'
        type:
          type: string
          example: 'SUCCESS'
        message:
          type: string
          example: 'Operation completed successfully'
        timestamp:
          type: string
          format: date-time
          example: '2025-10-19T10:30:00.000Z'
        request_id:
          type: string
          format: uuid
          example: '11111111-1111-4111-8111-111111111111'
        request_duration:
          type: integer
          example: 123

    # -------------------------
    # CATEGORY SCHEMAS
    # -------------------------
    Category:
      type: object
      properties:
        id: { type: string, example: "cat-1" }
        name: { type: string, example: "Food & Drinks" }
        icon: { type: string, example: "🍔" }
        color: { type: string, example: "red" }
        usage_count: { type: integer, example: 24 }

    CategoryCreateRequest:
      type: object
      required: [ name ]
      properties:
        name: { type: string }
        icon: { type: string }
        color: { type: string }

    CategoryUpdateRequest:
      type: object
      properties:
        name: { type: string }
        icon: { type: string }
        color: { type: string }

    StandardResponseCategoryList:
      type: object
      properties:
        meta: { $ref: '#/components/schemas/Meta' }
        data:
          type: object
          properties:
            categories:
              type: array
              items: { $ref: '#/components/schemas/Category' }

    StandardResponseCategorySingle:
      type: object
      properties:
        meta: { $ref: '#/components/schemas/Meta' }
        data:
          type: object
          properties:
            category: { $ref: '#/components/schemas/Category' }

    StandardResponseCategoryCreate:
      type: object
      properties:
        meta: { $ref: '#/components/schemas/Meta' }
        data:
          type: object
          properties:
            category: { $ref: '#/components/schemas/Category' }

    # -------------------------
    # BUDGET SCHEMAS
    # -------------------------
    BudgetTemplate:
      type: object
      properties:
        id: { type: string, example: "tmpl-1" }
        category_id: { type: string, example: "cat-1" }
        limit_amount: { type: number, example: 3000000 }
        alert_threshold: { type: integer, example: 80 }
        active: { type: boolean, example: true }

    BudgetTemplateCreateRequest:
      type: object
      required: [ category_id, limit_amount ]
      properties:
        category_id: { type: string }
        limit_amount: { type: number }
        alert_threshold: { type: integer }
        active: { type: boolean }

    StandardResponseBudgetTemplateList:
      type: object
      properties:
        meta: { $ref: '#/components/schemas/Meta' }
        data:
          type: object
          properties:
            templates:
              type: array
              items: { $ref: '#/components/schemas/BudgetTemplate' }

    StandardResponseBudgetTemplateSingle:
      type: object
      properties:
        meta: { $ref: '#/components/schemas/Meta' }
        data:
          type: object
          properties:
            template: { $ref: '#/components/schemas/BudgetTemplate' }

    BudgetPeriod:
      type: object
      properties:
        id: { type: string, example: "p1" }
        category_id: { type: string, example: "cat-1" }
        limit_amount: { type: number, example: 3000000 }
        spent_amount: { type: number, example: 1450000 }
        period_start: { type: string, format: date, example: "2025-11-01" }
        period_end: { type: string, format: date, example: "2025-11-30" }

    StandardResponseBudgetPeriodList:
      type: object
      properties:
        meta: { $ref: '#/components/schemas/Meta' }
        data:
          type: object
          properties:
            periods:
              type: array
              items: { $ref: '#/components/schemas/BudgetPeriod' }

    # -------------------------
    # EXPENSE SCHEMAS
    # -------------------------
    Expense:
      type: object
      properties:
        id: { type: string, example: "exp-1" }
        category_id: { type: string, example: "cat-1" }
        amount: { type: number, example: 150000 }
        timestamp: { type: string, format: date-time }
        note: { type: string, example: "Lunch" }

    ExpenseCreateRequest:
      type: object
      required: [ category_id, amount, timestamp ]
      properties:
        category_id: { type: string }
        amount: { type: number }
        timestamp: { type: string, format: date-time }
        note: { type: string }

    ExpenseUpdateRequest:
      type: object
      properties:
        amount: { type: number }
        note: { type: string }

    StandardResponseExpenseList:
      type: object
      properties:
        meta: { $ref: '#/components/schemas/Meta' }
        data:
          type: object
          properties:
            expenses:
              type: array
              items: { $ref: '#/components/schemas/Expense' }

    StandardResponseExpenseSingle:
      type: object
      properties:
        meta: { $ref: '#/components/schemas/Meta' }
        data:
          type: object
          properties:
            expense: { $ref: '#/components/schemas/Expense' }

    # -------------------------
    # SUBSCRIPTION SCHEMAS
    # -------------------------
    Subscription:
      type: object
      properties:
        id: { type: string, example: "sub-1" }
        category_id: { type: string, example: "cat-2" }
        name: { type: string, example: "Netflix" }
        amount: { type: number, example: 250000 }
        frequency: { type: string, example: "monthly" }
        next_payment_date: { type: string, format: date }
        auto_create_expense: { type: boolean, example: true }
        status: { type: string, example: "active" }
        notes: { type: string }

    SubscriptionCreateRequest:
      type: object
      required: [ category_id, name, amount, frequency, next_payment_date ]
      properties:
        category_id: { type: string }
        name: { type: string }
        amount: { type: number }
        frequency: { type: string, enum: [ "weekly", "monthly", "yearly", "custom" ] }
        custom_interval: { type: integer }
        next_payment_date: { type: string, format: date }
        auto_create_expense: { type: boolean }
        notes: { type: string }

    SubscriptionUpdateRequest:
      type: object
      properties:
        name: { type: string }
        amount: { type: number }
        frequency: { type: string }
        next_payment_date: { type: string, format: date }
        auto_create_expense: { type: boolean }
        status: { type: string }

    StandardResponseSubscriptionList:
      type: object
      properties:
        meta: { $ref: '#/components/schemas/Meta' }
        data:
          type: object
          properties:
            subscriptions:
              type: array
              items: { $ref: '#/components/schemas/Subscription' }

    StandardResponseSubscriptionSingle:
      type: object
      properties:
        meta: { $ref: '#/components/schemas/Meta' }
        data:
          type: object
          properties:
            subscription: { $ref: '#/components/schemas/Subscription' }

    # -------------------------
    # EXPENSE SUMMARY SCHEMAS
    # -------------------------
    ExpenseSummary:
      type: object
      properties:
        id: { type: string, example: "sum-1" }
        category_id: { type: string, example: "cat-1" }
        period_start: { type: string, format: date, example: "2025-11-01" }
        period_end: { type: string, format: date, example: "2025-11-30" }
        total_amount: { type: number, example: 4200000 }
        transaction_count: { type: integer, example: 15 }

    StandardResponseExpenseSummaryList:
      type: object
      properties:
        meta: { $ref: '#/components/schemas/Meta' }
        data:
          type: object
          properties:
            summaries:
              type: array
              items: { $ref: '#/components/schemas/ExpenseSummary' }

    # -------------------------
    # HEALTH SCHEMAS
    # -------------------------
    StandardResponseHealth:
      type: object
      properties:
        meta: { $ref: '#/components/schemas/Meta' }
        data:
          type: object
          properties:
            uptime: { type: string, example: "24h 15m" }
            database: { type: string, example: "connected" }
            redis: { type: string, example: "connected" }
            version: { type: string, example: "1.0.0" }

    # -------------------------
    # STANDARD RESPONSES
    # -------------------------
    StandardErrorResponse:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: object
          properties:
            details:
              type: string
              example: 'Detailed error description'
            path:
              type: string
              example: '/api/v1/auth/register'
            method:
              type: string
              example: 'POST'

    StandardResponseGenericSuccess:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: object
          properties:
            details:
              type: string
              example: 'Operation completed successfully'

    # -------------------------
    # AUTH SPECIFIC
    # -------------------------
    StandardResponseRegisterSuccess:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: object
          properties:
            accessToken:
              type: string
              example: 'eyJhbGciOiJIUzI1...'
              description: 'JWT access token (refresh token sent as HTTP-only cookie)'
            email:
              type: string
              example: 'storius.test@gmail.com'
            fullName:
              type: string
              example: 'Storius'

    StandardResponseLoginSuccess:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: object
          properties:
            accessToken:
              type: string
              example: 'eyJhbGciOiJIUzI1...'
              description: 'JWT access token (refresh token sent as HTTP-only cookie)'
            user:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                  example: 'aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa'
                email:
                  type: string
                  example: 'storius.test@gmail.com'
                fullName:
                  type: string
                  example: 'Storius'

    StandardResponseRefreshSuccess:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: object
          properties:
            accessToken:
              type: string
              example: 'new-access-token'
              description: 'New JWT access token (new refresh token sent as HTTP-only cookie)'

    # -------------------------
    # USER SPECIFIC
    # -------------------------
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 'aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa'
        email:
          type: string
          example: 'storius.test@gmail.com'
        fullName:
          type: string
          example: 'Storius'
        avatar:
          type: string
          example: 'https://cdn.example.com/avatars/aaaaaaaa.png'
        createdAt:
          type: string
          format: date-time
          example: '2025-10-01T08:00:00.000Z'
        updatedAt:
          type: string
          format: date-time
          example: '2025-11-04T12:05:00.000Z'

    StandardResponseUserFetch:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/User'

    StandardResponseUserUpdate:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/User'

    StandardResponseAvatarUpload:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: object
          properties:
            avatar_url:
              type: string
              example: 'https://cdn.example.com/avatars/aaaaaaaa.png'
            uploaded_at:
              type: string
              format: date-time
              example: '2025-11-04T12:15:00.000Z'

    # -------------------------
    # USER SETTINGS
    # -------------------------
    UserSettings:
      type: object
      properties:
        preferred_currency:
          type: string
          enum:
          - usd
          - eur
          - vnd
          example: 'vnd'
        default_monthly_budget:
          type: number
          format: double
          example: 5000000
        budget_alert:
          type: boolean
          example: true
        subscription_reminder:
          type: boolean
          example: true
        budget_start_day:
          type: integer
          example: 5
        weekly_summary:
          type: boolean
          example: false
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    StandardResponseSettingsFetch:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: object
          properties:
            settings:
              $ref: '#/components/schemas/UserSettings'

    StandardResponseSettingsUpdate:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: object
          properties:
            settings:
              $ref: '#/components/schemas/UserSettings'

    # -------------------------
    # REQUEST BODIES
    # -------------------------
    AuthRegisterRequest:
      type: object
      required:
      - full_name
      - email
      - password
      properties:
        full_name:
          type: string
          example: 'Storius'
        email:
          type: string
          format: email
          example: 'storius.test@gmail.com'
        password:
          type: string
          format: password
          example: 'Testpassword123!'

    AuthVerifyRequest:
      type: object
      required:
      - email
      - code
      - type
      properties:
        email:
          type: string
          format: email
          example: 'storius.test@gmail.com'
        code:
          type: string
          example: '123456'
        type:
          type: string
          enum:
          - register
          - forgot_password
          example: register

    AuthLoginRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
          example: 'storius.test@gmail.com'
        password:
          type: string
          example: 'Testpassword123!'

    AuthRefreshRequest:
      type: object
      properties:
        _note:
          type: string
          description: 'No request body needed. Refresh token is automatically read from HTTP-only cookie named "refreshToken".'
          example: 'This endpoint reads the refresh token from cookies, not the request body.'

    AuthLogoutRequest:
      type: object
      properties:
        _note:
          type: string
          description: 'No request body needed. Refresh token is automatically read from HTTP-only cookie. Access token is extracted from Authorization header (Bearer token).'
          example: 'This endpoint reads tokens from cookies and headers, not the request body.'

    AuthForgotPasswordRequest:
      type: object
      required:
      - email
      properties:
        email:
          type: string
          format: email
          example: 'storius.test@gmail.com'

    AuthResetPasswordRequest:
      type: object
      required:
      - code
      - new_password
      properties:
        code:
          type: string
          example: '654321'
          description: 'Verification code from email (already verified via /auth/verify endpoint)'
        new_password:
          type: string
          format: password
          example: 'NewPassw0rd!'
          description: 'New password (must be at least 6 characters with number, lowercase, uppercase, and symbol)'

    UserUpdateRequest:
      type: object
      properties:
        full_name:
          type: string
          example: 'Storius New'
        avatar:
          type: string
          example: 'https://cdn.example.com/tmp/aaaaaaaa.png'

    UserSettingsUpdateRequest:
      type: object
      properties:
        preferred_currency:
          type: string
          enum:
          - usd
          - eur
          - vnd
          example: 'vnd'
        default_monthly_budget:
          type: number
          example: 5000000
        budget_alert:
          type: boolean
          example: true
        subscription_reminder:
          type: boolean
          example: true
        budget_start_day:
          type: integer
          example: 5
        weekly_summary:
          type: boolean
          example: false

  securitySchemes: {}

tags:
- name: Auth
  description: Authentication endpoints (register, login, refresh, logout, forgot/reset password)
- name: Users
  description: User profile and settings endpoints
- name: Categories
  description: Category management endpoints
- name: Budgets
  description: Budget template and period management endpoints
- name: Expenses
  description: Expense management endpoints
- name: Subscriptions
  description: Subscription management endpoints
- name: Summaries
  description: Expense summaries for analytics
- name: Health
  description: Health check endpoints for monitoring and container orchestration
