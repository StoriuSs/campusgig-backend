openapi: 3.0.3
info:
  title: Moneymaze API
  version: '1.0.0'
  description: |
    ## Overview
    RESTful API for personal expense tracking and budget management. Built with NestJS, Prisma, and PostgreSQL.

    ## Features
    - **Authentication**: JWT-based auth with HTTP-only cookies for refresh tokens
    - **User Management**: Profile management with avatar uploads
    - **Categories**: Custom expense categories with icons and colors
    - **Budget Management**: Template-based budgets with automatic period generation
    - **Expense Tracking**: Detailed expense records with category support
    - **Subscriptions**: Recurring subscription management
    - **Analytics**: Expense summaries and spending insights
    - **Health Monitoring**: Comprehensive health checks for production readiness

    ## Response Format
    All API responses follow a standardized format:
    ```json
    {
      "meta": {
        "code": "200000",
        "type": "SUCCESS",
        "message": "Operation completed successfully",
        "timestamp": "2025-11-15T10:30:00.000Z",
        "request_id": "uuid",
        "request_duration": 123
      },
      "data": { /* response payload */ }
    }
    ```

    ## Authentication
    - Access tokens: Sent in `Authorization: Bearer <token>` header
    - Refresh tokens: Stored in HTTP-only cookies (automatic handling by browser)
    - Token refresh: Use `/auth/refresh` endpoint (no body needed)

servers:
- url: https://api.example.com/api/v1
  description: Production server
- url: http://localhost:9000/api/v1
  description: Local server

paths:
  # -------------------------
  # AUTH & VERIFICATION
  # -------------------------
  /auth/register:
    post:
      summary: Register new user (send verification code)
      tags:
      - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRegisterRequest'
            examples:
              sample:
                value:
                  full_name: 'Storius'
                  email: 'storius.test@gmail.com'
                  password: 'Testpassword123!'
      responses:
        '200':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponseRegisterSuccess'
              examples:
                success:
                  value:
                    meta:
                      code: '200101'
                      type: 'AUTH_REGISTER_SUCCESS'
                      message: 'Registration successful'
                      timestamp: '2025-10-19T10:30:00.000Z'
                      request_id: '11111111-1111-4111-8111-111111111111'
                      request_duration: 123
                    data:
                      email: "storius.test@gmail.com"
                      type: "register"
                      expires_in: 300
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                email_exists:
                  value:
                    meta:
                      code: '409001'
                      type: 'AUTH_EMAIL_EXISTS'
                      message: 'Email already exists'
                      timestamp: '2025-10-19T10:30:00.000Z'
                      request_id: '22222222-2222-4222-8222-222222222222'
                      request_duration: 45
                    data:
                      details: 'Email already exists'
                      path: '/api/v1/auth/register'
                      method: 'POST'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                invalid_email:
                  value:
                    meta:
                      code: '400001'
                      type: 'VALIDATION_ERROR'
                      message: 'Invalid email format'
                      timestamp: '2025-10-19T10:31:00.000Z'
                      request_id: '33333333-3333-4333-8333-333333333333'
                      request_duration: 12
                    data:
                      details: 'Email must be a valid email address'
                      path: '/api/v1/auth/register'
                      method: 'POST'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                server_error:
                  value:
                    meta:
                      code: '500000'
                      type: 'GENERIC_ERROR'
                      message: 'Internal server error'
                      timestamp: '2025-10-19T10:32:00.000Z'
                      request_id: '44444444-4444-4444-8444-444444444444'
                      request_duration: 3012
                    data:
                      details: 'Unexpected database error'
                      path: '/api/v1/auth/register'
                      method: 'POST'

  /auth/verify:
    post:
      summary: Verify registration or password reset code
      description: |
        Verify the verification code for registration or password reset.
        For 'register' type: Returns access token and sets refresh token as HTTP-only cookie.
        For 'forgot_password' type: Returns verification status only (no tokens).
      tags:
      - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthVerifyRequest'
            examples:
              sample:
                value:
                  email: 'storius.test@gmail.com'
                  code: '123456'
                  type: 'register'
      responses:
        '200':
          description: Verification successful and account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponseRegisterSuccess'
              examples:
                success:
                  value:
                    meta:
                      code: '200101'
                      type: 'AUTH_REGISTER_SUCCESS'
                      message: 'Registration successful'
                      timestamp: '2025-10-19T10:40:00.000Z'
                      request_id: '55555555-5555-4555-8555-555555555555'
                      request_duration: 87
                    data:
                      accessToken: 'eyJhbGciOiJIUzI1...'
                      email: 'storius.test@gmail.com'
                      fullName: 'Storius'
        '400':
          description: Invalid or expired code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                invalid_code:
                  value:
                    meta:
                      code: '400001'
                      type: 'VALIDATION_ERROR'
                      message: 'Invalid verification code'
                      timestamp: '2025-10-19T10:41:00.000Z'
                      request_id: '66666666-6666-4666-8666-666666666666'
                      request_duration: 10
                    data:
                      details: 'Code expired or does not match'
                      path: '/api/v1/auth/verify'
                      method: 'POST'

  /auth/login:
    post:
      summary: Login with email & password
      description: |
        Login with email and password.
        Returns an access token in the response body and sets a refresh token as an HTTP-only cookie.
      tags:
      - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
            examples:
              sample:
                value:
                  email: 'storius.test@gmail.com'
                  password: 'Testpassword123!'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponseLoginSuccess'
              examples:
                success:
                  value:
                    meta:
                      code: '200100'
                      type: 'AUTH_LOGIN_SUCCESS'
                      message: 'Login successful'
                      timestamp: '2025-10-19T11:00:00.000Z'
                      request_id: '77777777-7777-4777-8777-777777777777'
                      request_duration: 98
                    data:
                      accessToken: 'eyJhbGciOiJIUzI1...'
                      user:
                        id: 'aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa'
                        email: 'storius.test@gmail.com'
                        fullName: 'Storius'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                invalid_creds:
                  value:
                    meta:
                      code: '401001'
                      type: 'AUTH_INVALID_CREDENTIALS'
                      message: 'Invalid email or password'
                      timestamp: '2025-10-19T11:01:00.000Z'
                      request_id: '88888888-8888-4888-8888-888888888888'
                      request_duration: 15
                    data:
                      details: 'Invalid email or password'
                      path: '/api/v1/auth/login'
                      method: 'POST'

  /auth/refresh:
    post:
      summary: Refresh access token using refresh token (cookie)
      tags:
      - Auth
      description: |
        Refresh access token using refresh token stored in HTTP-only cookie.
        The refresh token is automatically sent by the browser and does not need to be in the request body.
        Returns a new access token and sets a new refresh token in the HTTP-only cookie.
        On success, server will revoke old refresh token and create a new refresh token.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRefreshRequest'
      responses:
        '200':
          description: Refresh success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponseRefreshSuccess'
              examples:
                success:
                  value:
                    meta:
                      code: '200102'
                      type: 'AUTH_REFRESH_SUCCESS'
                      message: 'Token refreshed successfully'
                      timestamp: '2025-10-19T11:05:00.000Z'
                      request_id: '99999999-9999-4999-8999-999999999999'
                      request_duration: 65
                    data:
                      accessToken: 'new-access-token'
        '401':
          description: Refresh token invalid or revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                revoked:
                  value:
                    meta:
                      code: '401002'
                      type: 'AUTH_UNAUTHORIZED'
                      message: 'Unauthorized access'
                      timestamp: '2025-10-19T11:06:00.000Z'
                      request_id: 'aaaaaaaa-bbbb-4ccc-8ddd-aaaaaaaaaaaa'
                      request_duration: 23
                    data:
                      details: 'Refresh token revoked or expired'
                      path: '/api/v1/auth/refresh'
                      method: 'POST'

  /auth/logout:
    post:
      summary: Logout current session (revoke refresh token)
      tags:
      - Auth
      description: |
        Logout user and revoke tokens.
        Refresh token is automatically read from HTTP-only cookie.
        Access token is extracted from Authorization header (Bearer token).
        The refresh token cookie will be cleared.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLogoutRequest'
      responses:
        '200':
          description: Logout success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponseGenericSuccess'
              examples:
                success:
                  value:
                    meta:
                      code: '200000'
                      type: 'SUCCESS'
                      message: 'Logout successful'
                      timestamp: '2025-10-19T11:10:00.000Z'
                      request_id: 'bbbbbbbb-bbbb-4bbb-8bbb-bbbbbbbbbbbb'
                      request_duration: 20
                    data:
                      details: 'Refresh token revoked'
        '401':
          description: Unauthorized (no valid refresh token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                not_auth:
                  value:
                    meta:
                      code: '401002'
                      type: 'AUTH_UNAUTHORIZED'
                      message: 'Unauthorized access'
                      timestamp: '2025-10-19T11:11:00.000Z'
                      request_id: 'cccccccc-cccc-4ccc-8ccc-cccccccccccc'
                      request_duration: 5
                    data:
                      details: 'No refresh token present'
                      path: '/api/v1/auth/logout'
                      method: 'POST'

  /auth/forgot-password:
    post:
      summary: Request password reset code (send to email)
      tags:
      - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthForgotPasswordRequest'
            examples:
              sample:
                value:
                  email: 'storius.test@gmail.com'
      responses:
        '200':
          description: Forgot password email sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponseGenericSuccess'
              examples:
                success:
                  value:
                    meta:
                      code: '200400'
                      type: 'EMAIL_SEND_SUCCESS'
                      message: 'Email sent successfully'
                      timestamp: '2025-10-19T11:20:00.000Z'
                      request_id: 'dddddddd-dddd-4ddd-8ddd-dddddddddddd'
                      request_duration: 150
                    data:
                      details: 'Password reset code sent to email'
        '404':
          description: Email not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                not_found:
                  value:
                    meta:
                      code: '404001'
                      type: 'USER_NOT_FOUND'
                      message: 'User not found'
                      timestamp: '2025-10-19T11:21:00.000Z'
                      request_id: 'eeeeeeee-eeee-4eee-8eee-eeeeeeeeeeee'
                      request_duration: 7
                    data:
                      details: 'User with provided email does not exist'
                      path: '/api/v1/auth/forgot-password'
                      method: 'POST'

  /auth/reset-password:
    post:
      summary: Reset password using verification code
      tags:
      - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthResetPasswordRequest'
            examples:
              sample:
                value:
                  code: '654321'
                  new_password: 'NewPassw0rd!'
      responses:
        '200':
          description: Password reset success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponseGenericSuccess'
              examples:
                success:
                  value:
                    meta:
                      code: '200000'
                      type: 'SUCCESS'
                      message: 'Operation completed successfully'
                      timestamp: '2025-10-19T11:30:00.000Z'
                      request_id: 'ffffffff-ffff-4fff-8fff-ffffffffffff'
                      request_duration: 60
                    data:
                      details: 'Password has been reset'
        '400':
          description: Invalid code or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                invalid:
                  value:
                    meta:
                      code: '400001'
                      type: 'VALIDATION_ERROR'
                      message: 'Invalid verification code'
                      timestamp: '2025-10-19T11:31:00.000Z'
                      request_id: '10101010-1010-4101-8101-101010101010'
                      request_duration: 11
                    data:
                      details: 'Code is invalid or expired'
                      path: '/api/v1/auth/reset-password'
                      method: 'POST'

  # -------------------------
  # USER & USER SETTINGS
  # -------------------------

  /users/me:
    get:
      summary: Get current user's profile
      tags:
      - Users
      responses:
        '200':
          description: User fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponseUserFetch'
              examples:
                success:
                  value:
                    meta:
                      code: '200200'
                      type: 'USER_FETCH_SUCCESS'
                      message: 'User fetched successfully'
                      timestamp: '2025-11-04T12:00:00.000Z'
                      request_id: 'aaaaaaaa-bbbb-4ccc-8ddd-aaaaaaaaaaaa'
                      request_duration: 45
                    data:
                      user:
                        id: 'aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa'
                        email: 'storius.test@gmail.com'
                        full_name: 'Storius'
                        avatar: 'https://cdn.example.com/avatars/aaaaaaaa.png'
                        created_at: '2025-10-01T08:00:00.000Z'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                unauthorized:
                  value:
                    meta:
                      code: '401002'
                      type: 'AUTH_UNAUTHORIZED'
                      message: 'Unauthorized access'
                      timestamp: '2025-11-04T12:00:05.000Z'
                      request_id: 'bbbbbbbb-cccc-4ddd-8eee-bbbbbbbbbbbb'
                      request_duration: 2
                    data:
                      details: 'Missing or invalid access token'
                      path: '/api/v1/users/me'
                      method: 'GET'

    patch:
      summary: Update current user's profile
      tags:
      - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
            examples:
              sample:
                value:
                  full_name: 'Storius New'
                  avatar: 'https://cdn.example.com/tmp/aaaaaaaa.png'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponseUserUpdate'
              examples:
                success:
                  value:
                    meta:
                      code: '200201'
                      type: 'USER_UPDATE_SUCCESS'
                      message: 'User updated successfully'
                      timestamp: '2025-11-04T12:05:00.000Z'
                      request_id: 'cccccccc-dddd-4eee-8fff-cccccccccccc'
                      request_duration: 30
                    data:
                      user:
                        id: 'aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa'
                        email: 'storius.test@gmail.com'
                        full_name: 'Storius New'
                        avatar: 'https://cdn.example.com/avatars/aaaaaaaa.png'
                        updated_at: '2025-11-04T12:05:00.000Z'
        '400':
          description: Validation error (bad payload)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                invalid_payload:
                  value:
                    meta:
                      code: '400001'
                      type: 'VALIDATION_ERROR'
                      message: 'Bad request'
                      timestamp: '2025-11-04T12:05:05.000Z'
                      request_id: 'dddddddd-eeee-4fff-8aaa-dddddddddddd'
                      request_duration: 8
                    data:
                      details: 'full_name is required'
                      path: '/api/v1/users/me'
                      method: 'PATCH'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                not_auth:
                  value:
                    meta:
                      code: '401002'
                      type: 'AUTH_UNAUTHORIZED'
                      message: 'Unauthorized access'
                      timestamp: '2025-11-04T12:05:10.000Z'
                      request_id: 'eeeeeeee-ffff-4aaa-8bbb-eeeeeeeeeeee'
                      request_duration: 3
                    data:
                      details: 'Missing or invalid access token'
                      path: '/api/v1/users/me'
                      method: 'PATCH'

    delete:
      summary: Soft delete current user's account
      tags:
      - Users
      responses:
        '200':
          description: User deleted (soft)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponseGenericSuccess'
              examples:
                success:
                  value:
                    meta:
                      code: '200000'
                      type: 'SUCCESS'
                      message: 'Operation completed successfully'
                      timestamp: '2025-11-04T12:10:00.000Z'
                      request_id: 'ffffffff-1111-4bbb-8ccc-ffffffffffff'
                      request_duration: 56
                    data:
                      details: 'User soft-deleted'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                not_auth:
                  value:
                    meta:
                      code: '401002'
                      type: 'AUTH_UNAUTHORIZED'
                      message: 'Unauthorized access'
                      timestamp: '2025-11-04T12:10:05.000Z'
                      request_id: '12121212-1212-4121-8121-121212121212'
                      request_duration: 2
                    data:
                      details: 'Missing or invalid access token'
                      path: '/api/v1/users/me'
                      method: 'DELETE'

  /users/me/avatar:
    post:
      summary: Upload or change user's avatar
      tags:
      - Users
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                avatar:
                  type: string
                  format: binary
            encoding:
              avatar:
                contentType: image/png, image/jpeg
      responses:
        '200':
          description: Avatar upload success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponseAvatarUpload'
              examples:
                success:
                  value:
                    meta:
                      code: '200300'
                      type: 'UPLOAD_FILE_SUCCESS'
                      message: 'File uploaded successfully'
                      timestamp: '2025-11-04T12:15:00.000Z'
                      request_id: '21212121-2121-4212-8121-212121212121'
                      request_duration: 140
                    data:
                      avatar_url: 'https://cdn.example.com/avatars/aaaaaaaa.png'
                      uploaded_at: '2025-11-04T12:15:00.000Z'
        '400':
          description: Invalid file type or too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                invalid_file:
                  value:
                    meta:
                      code: '415001'
                      type: 'UPLOAD_INVALID_TYPE'
                      message: 'Invalid file type'
                      timestamp: '2025-11-04T12:15:05.000Z'
                      request_id: '31313131-3131-4313-8131-313131313131'
                      request_duration: 3
                    data:
                      details: 'File must be PNG or JPEG and <= 2MB'
                      path: '/api/v1/users/me/avatar'
                      method: 'POST'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                not_auth:
                  value:
                    meta:
                      code: '401002'
                      type: 'AUTH_UNAUTHORIZED'
                      message: 'Unauthorized access'
                      timestamp: '2025-11-04T12:15:08.000Z'
                      request_id: '41414141-4141-4414-8141-414141414141'
                      request_duration: 2
                    data:
                      details: 'Missing or invalid access token'
                      path: '/api/v1/users/me/avatar'
                      method: 'POST'

  /users/settings:
    get:
      summary: Get current user's settings
      tags:
      - Users
      responses:
        '200':
          description: Settings fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponseSettingsFetch'
              examples:
                success:
                  value:
                    meta:
                      code: '200200'
                      type: 'USER_FETCH_SUCCESS'
                      message: 'User fetched successfully'
                      timestamp: '2025-11-04T12:20:00.000Z'
                      request_id: '51515151-5151-4515-8151-515151515151'
                      request_duration: 22
                    data:
                      settings:
                        preferred_currency: 'vnd'
                        default_monthly_budget: 5000000
                        budget_alert: true
                        subscription_reminder: true
                        budget_start_day: 5
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                not_auth:
                  value:
                    meta:
                      code: '401002'
                      type: 'AUTH_UNAUTHORIZED'
                      message: 'Unauthorized access'
                      timestamp: '2025-11-04T12:20:05.000Z'
                      request_id: '61616161-6161-4616-8161-616161616161'
                      request_duration: 2
                    data:
                      details: 'Missing or invalid access token'
                      path: '/api/v1/users/settings'
                      method: 'GET'

    patch:
      summary: Update current user's settings
      tags:
      - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserSettingsUpdateRequest'
            examples:
              sample:
                value:
                  preferred_currency: 'vnd'
                  default_monthly_budget: 5000000
                  budget_alert: true
                  subscription_reminder: false
                  budget_start_day: 10
      responses:
        '200':
          description: Settings updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponseSettingsUpdate'
              examples:
                success:
                  value:
                    meta:
                      code: '200201'
                      type: 'USER_UPDATE_SUCCESS'
                      message: 'User updated successfully'
                      timestamp: '2025-11-04T12:25:00.000Z'
                      request_id: '71717171-7171-4717-8171-717171717171'
                      request_duration: 40
                    data:
                      settings:
                        preferred_currency: 'vnd'
                        default_monthly_budget: 5000000
                        budget_alert: true
                        subscription_reminder: false
                        budget_start_day: 10
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                invalid:
                  value:
                    meta:
                      code: '400001'
                      type: 'VALIDATION_ERROR'
                      message: 'Bad request'
                      timestamp: '2025-11-04T12:25:05.000Z'
                      request_id: '81818181-8181-4818-8181-818181818181'
                      request_duration: 6
                    data:
                      details: 'budget_start_day must be an integer between 1 and 28'
                      path: '/api/v1/users/settings'
                      method: 'PATCH'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                not_auth:
