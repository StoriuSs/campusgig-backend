auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 24h

ruler:
  alertmanager_url: http://localhost:9093

query_scheduler:
  max_outstanding_requests_per_tenant: 2048

# Retention and Limits
limits_config:
  # 14 days. Long enough to cover a full sprint cycle of incident
  # debugging (something broken last week, only noticed today) but short
  # enough that storage stays bounded even when traffic grows. Loki's
  # compactor (configured below) garbage-collects chunks past this window.
  # Shorter retention also makes Grafana queries snappier.
  retention_period: 336h
  split_queries_by_interval: 24h
  max_query_parallelism: 32

# Compactor for log retention
compactor:
  working_directory: /loki/compactor
  shared_store: filesystem
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
