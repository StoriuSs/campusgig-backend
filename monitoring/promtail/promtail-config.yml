server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape Docker container logs
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Only collect logs from containers with specific names
      - source_labels: ['__meta_docker_container_name']
        regex: '/(postgres|redis|keycloak|prometheus|grafana|loki|promtail)-hexagonal'
        action: keep
      
      # Extract container name as a label
      - source_labels: ['__meta_docker_container_name']
        target_label: 'container'
        regex: '/(.+)'
        replacement: '$1'
      
      # Extract image name
      - source_labels: ['__meta_docker_container_image']
        target_label: 'image'
      
      # Add service label based on container name
      - source_labels: ['__meta_docker_container_name']
        target_label: 'service'
        regex: '/([^-]+)-.*'
        replacement: '$1'

